<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preparing your guide — Self Beacon</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0D0D;color:#fff;
         display:flex;align-items:center;justify-content:center;
         min-height:100vh;padding:2rem}
    .card{background:#161B22;border:1px solid #30363D;border-radius:16px;
          padding:3rem 2rem;max-width:480px;width:100%;text-align:center}
    .spinner{width:48px;height:48px;border:3px solid #30363D;
             border-top-color:#E8401C;border-radius:50%;
             animation:spin .8s linear infinite;margin:0 auto 1.5rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:.75rem}
    p{color:#9CA3AF;font-size:.9rem;line-height:1.6}
    .name{color:#E8401C;font-weight:700}
    .timer{font-size:.8rem;color:#6B7280;margin-top:.5rem}
    .dl-btn{display:none;margin:1.5rem auto 0;padding:14px 32px;
            background:#E8401C;color:#fff;border:none;border-radius:8px;
            font-size:1rem;font-weight:700;cursor:pointer;width:100%}
    .dl-btn:hover{background:#c73518}
    .err{display:none;color:#EF4444;margin-top:1rem;font-size:.85rem;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1>Preparing your personalized guide...</h1>
    <p>Your guide is being generated based on your assessment responses.</p>
    <p class="timer" id="timer">This usually takes 20-30 seconds.</p>
    <button class="dl-btn" id="dl-btn">Download my guide</button>
    <div class="err" id="err">
      Something went wrong. Please email <a href="mailto:wecare@selfbeacon.com" style="color:#E8401C">wecare@selfbeacon.com</a> and we will send your guide within 24 hours.
    </div>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var profile = {
      archetype:     decodeURIComponent(params.get("archetype")    || "The Early Burnout"),
      severity:      decodeURIComponent(params.get("severity")     || ""),
      emotions:      decodeURIComponent(params.get("emotions")     || ""),
      triggers:      decodeURIComponent(params.get("triggers")     || ""),
      responses:     decodeURIComponent(params.get("responses")    || ""),
      actions:       decodeURIComponent(params.get("actions")      || ""),
      consequences:  decodeURIComponent(params.get("consequences") || ""),
      topPainPoints: decodeURIComponent(params.get("topPainPoints")|| ""),
    };
    document.getElementById("arc-name").textContent = profile.archetype;
    var pdfBase64 = null;
    var elapsed = 0;
    var timerEl = document.getElementById("timer");
    var timerInt = setInterval(function(){
      elapsed++;
      timerEl.textContent = elapsed + " seconds...";
      if(elapsed > 45)
        timerEl.textContent = "Almost there — this can take up to 60 seconds...";
    }, 1000);
    function downloadPDF() {
      var bytes = atob(pdfBase64);
      var arr = new Uint8Array(bytes.length);
      for(var i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
      var blob = new Blob([arr],{type:"application/pdf"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "30-Day-Burnout-Reset-" +
        profile.archetype.replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"") + ".pdf";
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }
    fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(profile),
    })
    .then(function(res){ return res.json(); })
    .then(function(data){
      clearInterval(timerInt);
      document.getElementById("spinner").style.display="none";
      timerEl.style.display="none";
      if(data.error) throw new Error(data.error);
      pdfBase64 = data.pdf;
      var btn = document.getElementById("dl-btn");
      btn.style.display="block";
      btn.onclick = downloadPDF;
      downloadPDF(); // auto-trigger download
    })
    .catch(function(e){
      clearInterval(timerInt);
      document.getElementById("spinner").style.display="none";
      document.getElementById("err").style.display="block";
      console.error(e);
    });
  </script>
</body>
</html>
