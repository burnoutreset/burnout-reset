[build]
  publish   = "public"
  functions = "netlify/functions"

# Raise function timeout — required for Claude API (takes 20-30s)
# Note: 26s limit requires Netlify Pro ($19/mo). Free tier = 10s (will timeout).
[functions]
  node_bundler = "esbuild"

  [functions."generate-and-email"]
    timeout = 26

  [functions."generate"]
    timeout = 26

# Route /api/* to Netlify functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200